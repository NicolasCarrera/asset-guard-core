spring:
  datasource:
    url: jdbc:tc:postgresql:17-alpine:///assetguard-test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: false

  threads:
    virtual:
      enabled: true

logging:
  level:
    org.hibernate.SQL: debug
